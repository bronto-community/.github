name: Update Featured Repos

# Prereqs: create a GitHub App in the org with "Contents: Read & write" on this
# repo, then add these two org/repo secrets:
#   BRONTO_COMMUNITY_BOT_APP_ID          — the numeric App ID
#   BRONTO_COMMUNITY_BOT_PRIVATE_KEY     — the PEM private key generated for the app

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update-featured-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # GITHUB_TOKEN is not used for push; the App token handles that

    env:
      UPDATE_BRANCH: automated/update-featured-repos

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BRONTO_COMMUNITY_BOT_APP_ID }}
          private-key: ${{ secrets.BRONTO_COMMUNITY_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # Checkout via the App token so git push is authenticated automatically
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch and rank org repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api orgs/bronto-community/repos \
            --paginate \
            --jq '[.[] | select(.archived == false and .fork == false and .name != ".github") | {
              name: .name,
              description: .description,
              url: .html_url,
              stars: .stargazers_count,
              forks: .forks_count,
              pushed_at: .pushed_at
            }]' \
            | jq -s 'add // []' \
            | python3 scripts/update_featured_repos.py

      - name: Open or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet; then
            echo "No changes — nothing to PR."
            exit 0
          fi

          git config user.name 'bronto-community-bot[bot]'
          git config user.email '${{ secrets.BRONTO_COMMUNITY_BOT_APP_ID }}+bronto-community-bot[bot]@users.noreply.github.com'

          git checkout -b "$UPDATE_BRANCH"
          git add profile/README.md
          git commit -m 'chore: update featured repos'
          git push --force origin "$UPDATE_BRANCH"

          # Create the PR only if one isn't already open.
          # A force-push to the same branch updates the existing PR in place,
          # so there is never more than one open PR from this automation.
          OPEN=$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq 'length')
          if [ "$OPEN" -eq 0 ]; then
            gh pr create \
              --title "chore: update featured repos" \
              --body "Weekly automated update of the featured projects table in \`profile/README.md\`. Ranked by stars, forks, and recent push activity." \
              --base main \
              --head "$UPDATE_BRANCH"
          else
            echo "PR already open — updated in place via force-push."
          fi
