name: Update Featured Repos

# Prereqs: create a GitHub App in the org with "Contents: Read & write" on this
# repo, then add these two org/repo secrets:
#   APP_ID          — the numeric App ID (Settings → Developer settings → GitHub Apps)
#   APP_PRIVATE_KEY — the PEM private key generated for the app

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update-featured-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # GITHUB_TOKEN is not used for push; the App token handles that

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # Checkout via the App token so git push is authenticated automatically
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch and rank org repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api orgs/bronto-community/repos \
            --paginate \
            --jq '[.[] | select(.archived == false and .fork == false and .name != ".github") | {
              name: .name,
              description: .description,
              url: .html_url,
              stars: .stargazers_count,
              forks: .forks_count,
              pushed_at: .pushed_at
            }]' \
            | jq -s 'add // []' \
            | python3 scripts/update_featured_repos.py

      - name: Commit and push if changed
        run: |
          git config user.name 'bronto-community-bot[bot]'
          git config user.email '${{ secrets.APP_ID }}+bronto-community-bot[bot]@users.noreply.github.com'
          git diff --quiet && echo "Nothing to commit." || (
            git add profile/README.md
            git commit -m 'chore: update featured repos'
            git push
          )
